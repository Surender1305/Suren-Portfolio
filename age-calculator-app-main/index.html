<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  
  <title> Age calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
 
</head>
<body>
  <div class="container">
    <form class="form">
      <div class=" input1 input-day">
        <label for="">Date</label> <br>
        <input class="date" type="text" placeholder="DD">
        <div class="error error-date"></div>
      </div>
      <div class=" input1 input-month">
        <label for="">Months</label> <br>
        <input class="month" type="text" placeholder="MM">
        <div class="error error-month"></div>
      </div>
      <div class="input1 input-year">
        <label for="">Year</label> <br>
        <input class="year" type="text" placeholder="YYYY">
        <div class="error error-year"></div>
      </div>

    
    </form>

    <div class="sep">
      <button class="btn" ><svg xmlns="http://www.w3.org/2000/svg" width="46" height="44" viewBox="0 0 46 44"><g fill="none" stroke="#FFF" stroke-width="2"><path d="M1 22.019C8.333 21.686 23 25.616 23 44M23 44V0M45 22.019C37.667 21.686 23 25.616 23 44"/></g></svg></button>
    </div>
<div class="result">
    <div class="year">
      <p class="results__years"><span>--</span> Years</p>
    </div> 
    <div class="months">
     <p class="results__months"><span>--</span>  months</p>
    </div> 
    <div class="days">
      <p class="results__days"><span>--</span> days</p>
    </div> 
  </div>
    
  </div>







  <!-- Day
  DD

  Month
  MM

  Year
  YYYY

  -- years
  -- months
  -- days -->

 <script src="./index.js"></script> 
</body>
</html>
